bundle:
  name: mlops-quickstart

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    default: true
    variables:
      catalog_name: mlops_quickstart_dev
      schema_name: iris
      environment: dev

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog_name: mlops_quickstart_prod
      schema_name: iris
      environment: prod

variables:
  catalog_name:
    description: "Name of the Unity Catalog to use"
    default: "mlops_quickstart_dev"
  schema_name:
    description: "Name of the schema to use within the catalog"
    default: "iris"
  environment:
    description: "Environment name (dev/prod)"
    default: "dev"
