bundle:
  name: mlops-quickstart

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    default: true
    variables:
      catalog_name: odoren_fevm_aws_catalog
      schema_name: iris_dev
      environment: dev

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog_name: odoren_fevm_aws_catalog
      schema_name: iris_prod
      environment: prod

variables:
  catalog_name:
    description: "Name of the Unity Catalog to use"
    default: "odoren_fevm_aws_catalog"
  schema_name:
    description: "Name of the schema to use within the catalog"
    default: "iris_dev"
  environment:
    description: "Environment name (dev/prod)"
    default: "dev"